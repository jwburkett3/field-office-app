    import { getFirestore, doc, getDoc, setDoc, onSnapshot, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCBoj_pqLK8ssAExTrRxXUPeUZZJiU-FbY",
      authDomain: "denali-field-office.firebaseapp.com",
      projectId: "denali-field-office",
      storageBucket: "denali-field-office.firebasestorage.app",
      messagingSenderId: "277673567657",
      appId: "1:277673567657:web:5be4ccf7200a369d5150b8"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);
    const storage = getStorage(app);
    window._fb = { db, storage, doc, getDoc, setDoc, onSnapshot, collection, getDocs, ref, uploadBytes, getDownloadURL, deleteObject };
    window.dispatchEvent(new Event('firebase-ready'));

  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif;background:#0f1117;color:#e8eaf0;}
    ::-webkit-scrollbar{width:5px;} ::-webkit-scrollbar-track{background:#1a1d27;} ::-webkit-scrollbar-thumb{background:#3a3f55;border-radius:3px;}
    #root{min-height:100vh;}
    .btn{cursor:pointer;border:none;border-radius:10px;font-family:inherit;font-weight:600;transition:all .18s;display:inline-flex;align-items:center;gap:6px;}
    .btn:active{transform:scale(.96);}
    .btn-primary{background:#f5a623;color:#0f1117;padding:11px 20px;font-size:14px;}
    .btn-primary:hover{background:#f7b84b;}
    .btn-ghost{background:transparent;color:#a0a4b8;padding:9px 14px;font-size:13px;border:1.5px solid #2a2f45;}
    .btn-ghost:hover{border-color:#f5a623;color:#f5a623;}
    .btn-danger{background:rgba(255,77,79,.13);color:#ff7875;padding:7px 12px;font-size:12px;border:1px solid rgba(255,77,79,.27);}
    .btn-danger:hover{background:rgba(255,77,79,.27);}
    .btn-archive{background:rgba(245,166,35,.12);color:#f5a623;border:1px solid rgba(245,166,35,.3);padding:7px 12px;font-size:12px;}
    .btn-export{background:rgba(74,144,226,.15);color:#4a90e2;padding:7px 12px;font-size:12px;border:1px solid rgba(74,144,226,.35);}
    .btn-save{background:#1a3a1a;color:#52c41a;padding:7px 12px;font-size:12px;border:1px solid #2a5a2a;}
    .btn-edit{background:#1e3a5a;color:#4a90e2;padding:7px 12px;font-size:12px;border:1px solid #2a5080;}
    .card{background:#1a1d27;border:1px solid #2a2f45;border-radius:16px;}
    .tag{display:inline-flex;align-items:center;background:#2a2f45;border-radius:6px;padding:2px 8px;font-size:11px;color:#a0a4b8;}
    .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.82);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px;}
    .pin-dot{width:13px;height:13px;border-radius:50%;border:2px solid #606480;background:transparent;transition:all .15s;}
    .pin-dot.filled{background:#f5a623;border-color:#f5a623;}
    .pin-key{width:68px;height:68px;border-radius:50%;background:#1e2230;border:1.5px solid #2a2f45;color:#e8eaf0;font-size:22px;font-weight:600;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;}
    .pin-key:hover{background:#2a2f45;border-color:#f5a623;}
    .pin-key:active{transform:scale(.93);background:#f5a623;color:#0f1117;}
    .folder-card{transition:all .18s;cursor:pointer;}
    .folder-card:hover{border-color:#f5a623!important;transform:translateY(-2px);}
    .project-card{transition:all .18s;cursor:pointer;}
    .project-card:hover{border-color:#4a90e2!important;}
    .file-row:hover{background:#222637!important;}
    .export-opt{display:flex;align-items:center;gap:14px;padding:14px 18px;cursor:pointer;border-radius:12px;transition:background .15s;}
    .export-opt:hover{background:#222637;}
    .fade-in{animation:fadeIn .28s ease;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(7px);}to{opacity:1;transform:translateY(0);}}
    @keyframes spin{from{transform:rotate(0);}to{transform:rotate(360deg);}}
    .spinning{animation:spin 1s linear infinite;display:inline-block;}
    input,select{font-family:inherit;}
    input:focus,select:focus{outline:none;border-color:#f5a623!important;}
    .toast{position:fixed;top:18px;right:18px;z-index:999;padding:11px 18px;border-radius:10px;font-size:14px;font-weight:500;box-shadow:0 8px 32px rgba(0,0,0,.5);pointer-events:none;}
    header{background:#13151f;border-bottom:1px solid #2a2f45;padding:0 16px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
    main{max-width:880px;margin:0 auto;padding:28px 16px;}
    .pwa-banner{display:none;position:fixed;bottom:0;left:0;right:0;background:#1a1d27;border-top:1px solid #2a2f45;padding:14px 18px;z-index:100;align-items:center;gap:12px;}
    .pwa-banner.show{display:flex;}
  </style>
</head>

function markFieldTicketsBilled(projId){
  if(!isPriv()){showToast("Only Admin or GM can mark as billed","error");return;}

  if(!proj)return;

  fbSaveProject(updated);

async function fbLoad() {
  try {
    const {doc,getDoc,setDoc,onSnapshot,collection} = fbFns;
    // Load app settings (pins, workers)
    const settingsSnap = await getDoc(doc(db,"app","settings"));
    if (settingsSnap.exists()) {
      const d = settingsSnap.data();
      state.appPin = d.appPin||"";
      state.pins = {...{admin:"",gm:"",sales:"",contracts:""},...(d.pins||{})};
    state.contractsUnlocked = d.contractsUnlocked === true;
      state.workers = d.workers||state.workers;
    }
    // Load receipt amounts
    const receiptsSnap = await getDoc(doc(db,"app","receiptAmounts"));
    if (receiptsSnap.exists()) state.receiptAmounts = receiptsSnap.data()||{};
    // Listen to projects in real-time
    const {collection:col} = fbFns;
    fbFns.onSnapshot(col(db,"projects"), snap => {
      state.projects = snap.docs.map(d=>({id:d.id,...d.data()}));
      render();
    });
    state.fbReady = true;
  } catch(e) { console.error("FB load error",e); state.fbReady=true; }
  render();
}

async function fbUploadFile(projectId, folderId, file) {
  const {ref,uploadBytes,getDownloadURL} = fbFns;
  // Sanitize filename — remove special chars that break Firebase Storage paths
  const safeName = file.name.replace(/[^a-zA-Z0-9._-]/g,"_");
  const path = `projects/${projectId}/${folderId}/${Date.now()}_${safeName}`;
  const storageRef = ref(storage, path);
  const metadata = { contentType: file.type || "application/octet-stream" };
  const snap = await uploadBytes(storageRef, file, metadata);
  const url = await getDownloadURL(snap.ref);
  return {storagePath: path, downloadURL: url};
}

async function handleFiles(files){
  if(!state.worker){showToast("Select your name first","error");return;}
  const proj=getProject();if(!proj){showToast("No active project","error");return;}
  if(!files||files.length===0)return;
  state.uploading=true;state.uploadProgress=`Uploading 0/${files.length}…`;state.showUpload=false;render();
  const newFiles=[];
  for(let i=0;i<files.length;i++){
    const file=files[i];
    state.uploadProgress=`Uploading ${i+1}/${files.length}…`;render();
    try{
      const {storagePath,downloadURL}=await fbUploadFile(proj.id,state.activeFolder,file);
      const fobj={id:Date.now().toString()+Math.random(),name:file.name,size:file.size,type:file.type,uploader:state.worker,uploadedAt:Date.now(),downloadURL,storagePath};
      newFiles.push(fobj);
    }catch(e){
      console.error("Upload error:",e);
      const msg=e?.code||e?.message||"unknown error";
      if(msg.includes("unauthorized")||msg.includes("permission")||msg.includes("403")){
        showToast("Permission denied — check Firebase Storage rules","error");
      } else if(msg.includes("network")||msg.includes("fetch")){
        showToast("Network error — check your connection","error");
      } else {
        showToast("Upload failed: "+msg,"error");
      }
      state.uploading=false;state.uploadProgress="";render();return;
    }
  }
  if(newFiles.length===0){state.uploading=false;state.uploadProgress="";render();return;}
  // Deep clone project to avoid mutation issues
  const freshProj=JSON.parse(JSON.stringify(proj));
  freshProj.folders[state.activeFolder]=[...(freshProj.folders[state.activeFolder]||[]),...newFiles];
  // Flag new field tickets
  if(state.activeFolder==="field_tickets"){
    freshProj.hasNewFieldTickets=true;
    freshProj.fieldTicketsBilled=false;
  }
  await fbSaveProject(freshProj);
  state.uploading=false;state.uploadProgress="";showToast(newFiles.length+" file(s) uploaded ✓");
}

async function deleteFile(fileId){
  if(!isPriv()){showToast("Only Admin or GM can delete files","error");return;}
  const proj=getProject();if(!proj)return;
  const file=(proj.folders[state.activeFolder]||[]).find(f=>f.id===fileId);
  if(file?.storagePath){
    try{const {ref:sref,deleteObject:del}=fbFns;await del(sref(storage,file.storagePath));}catch(e){console.warn("Storage delete failed",e);}
  }
  const updated={...proj,folders:{...proj.folders,[state.activeFolder]:(proj.folders[state.activeFolder]||[]).filter(f=>f.id!==fileId)}};
  await fbSaveProject(updated);
  if(state.receiptAmounts[fileId]){delete state.receiptAmounts[fileId];await fbSaveReceiptAmounts();}
  showToast("File deleted","error");
}

async function scanReceiptWithAI(file){
  if(!file.downloadURL){showToast("File not ready yet","error");return;}
  state.scanningReceiptId=file.id;render();
  try{
    // Use a CORS proxy to fetch the image, or use URL source directly
    let imageSource;
    try{
      const resp=await fetch(file.downloadURL);
      const blob=await resp.blob();
      const base64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(blob);});
      imageSource={type:"base64",media_type:file.type||"image/jpeg",data:base64};
    }catch(fetchErr){
      // Fallback: use URL directly
      imageSource={type:"url",url:file.downloadURL};
    }
    const aiResp=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({
        model:"claude-sonnet-4-5",
        max_tokens:128,
        messages:[{role:"user",content:[
          {type:"image",source:imageSource},
          {type:"text",text:"Look at this receipt image carefully. Find the final total amount due (the largest total at the bottom, after tax and everything). Reply with ONLY the numeric amount, no dollar sign, no words, no spaces. Example: 47.23 — If you cannot find any total amount, reply with exactly: NONE"}
        ]}]
      })
    });
    const data=await aiResp.json();
    const raw=data?.content?.[0]?.text?.trim()||"NONE";
    if(raw==="NONE"||isNaN(parseFloat(raw))){
      showToast("Could not detect amount — enter manually","error");
      state.editingReceiptId=file.id;
      state.receiptInput="";
    } else {
      const amt=parseFloat(raw).toFixed(2);
      state.receiptAmounts[file.id]=amt;
      await fbSaveReceiptAmounts();
      showToast("Amount detected: $"+amt);
    }
  }catch(e){
    console.error("Scan error:",e);
    showToast("Scan failed — please enter manually","error");
    state.editingReceiptId=file.id;
    state.receiptInput="";
  }
  state.scanningReceiptId=null;render();
}

      <div style="display:flex;gap:8px;margin-bottom:14px">
        <input id="crewIn" value="${state.newCrewName}" placeholder="Full name…" style="flex:1;background:#0f1117;border:1.5px solid #2a2f45;border-radius:10px;padding:9px 12px;color:#e8eaf0;font-size:13px" oninput="state.newCrewName=this.value" onkeydown="if(event.key==='Enter'){const n=state.newCrewName.trim();if(n&&!state.workers.includes(n)){state.workers.push(n);state.newCrewName='';fbSaveSettings();showToast(n+' added');}else{showToast('Invalid or duplicate name','error');}render();}"/>
        <button class="btn btn-primary" style="padding:9px 14px" onclick="const n=state.newCrewName.trim();if(n&&!state.workers.includes(n)){state.workers.push(n);state.newCrewName='';fbSaveSettings();showToast(n+' added');}else{showToast('Invalid or duplicate','error');}render()">+ Add</button>
      </div>
      <div style="display:flex;flex-direction:column;gap:7px">
        ${state.workers.map((w,i)=>`<div style="display:flex;align-items:center;gap:8px;padding:9px 12px;background:#13151f;border-radius:10px;border:1px solid #2a2f45">
          <div style="width:30px;height:30px;border-radius:50%;background:#2a2f45;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#f5a623;flex-shrink:0">${w.split(" ").map(n=>n[0]).join("").slice(0,2).toUpperCase()}</div>
          ${state.editingCrewIndex===i?`<input value="${state.editingCrewValue}" style="flex:1;background:#0f1117;border:1.5px solid #f5a623;border-radius:7px;padding:5px 9px;color:#e8eaf0;font-size:13px" oninput="state.editingCrewValue=this.value" onkeydown="if(event.key==='Enter'){if(state.editingCrewValue.trim()){state.workers[state.editingCrewIndex]=state.editingCrewValue.trim();state.editingCrewIndex=null;fbSaveSettings();showToast('Updated');}else{state.editingCrewIndex=null;}render();}"/>`:`<span style="flex:1;font-weight:500;font-size:13px">${w}</span>`}
          <div style="display:flex;gap:5px">
            ${state.editingCrewIndex===i?`<button class="btn btn-save" style="padding:4px 8px;font-size:12px" onclick="if(state.editingCrewValue.trim()){state.workers[${i}]=state.editingCrewValue.trim();state.editingCrewIndex=null;fbSaveSettings();showToast('Updated');}else{state.editingCrewIndex=null;}render()">✓</button><button class="btn btn-ghost" style="padding:4px 7px;font-size:12px" onclick="state.editingCrewIndex=null;render()">✕</button>`:
            `<button class="btn btn-edit" style="padding:4px 8px;font-size:12px" onclick="state.editingCrewIndex=${i};state.editingCrewValue='${w}';render()">✏️</button><button class="btn btn-danger" style="padding:4px 8px;font-size:12px" onclick="state.workers.splice(${i},1);fbSaveSettings();showToast('${w} removed','error');render()">✕</button>`}
          </div>
        </div>`).join("")}
      </div>
    </div></div>`;
  }

  // Archive
  if(state.showArchive){
    modals+=`<div class="modal-bg" onclick="state.showArchive=false;render()"><div class="card fade-in" style="padding:26px;width:100%;max-width:580px;max-height:85vh;overflow-y:auto" onclick="event.stopPropagation()">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px">
        <div><h2 style="font-weight:700;font-size:19px">📦 Closed Jobs</h2><p style="color:#606480;font-size:12px;margin-top:3px">Archived projects</p></div>
        <button class="btn btn-ghost" style="padding:5px 10px;font-size:12px" onclick="state.showArchive=false;render()">✕</button>
      </div>
      ${archivedProjects.length===0?`<div style="text-align:center;padding:36px 0;color:#606480"><div style="font-size:36px;margin-bottom:10px">📭</div><div style="font-weight:600">No archived projects</div></div>`:
      `<div style="display:grid;gap:10px">${archivedProjects.map(p=>{
        const total=Object.values(p.folders||{}).reduce((s,f)=>s+f.length,0);
        return `<div style="background:#13151f;border:1px solid #2a2f45;border-radius:13px;padding:16px 18px;display:flex;align-items:center;gap:12px">
          <div style="width:42px;height:42px;background:#2a2f45;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">📦</div>
          <div style="flex:1;min-width:0">
            <div style="font-weight:700;font-size:14px">${p.name}</div>
            <div style="color:#606480;font-size:12px;margin-top:2px">Archived ${p.archivedAt?fmt(p.archivedAt):""} · ${total} file${total!==1?"s":""}</div>
          </div>
          <div style="display:flex;gap:6px;flex-shrink:0">
            <button class="btn btn-ghost" style="padding:6px 10px;font-size:12px" onclick="state.showArchive=false;state.activeProjectId='${p.id}';state.screen='project';render()">View →</button>
            ${isPriv()?`<button class="btn btn-save" style="padding:6px 10px;font-size:12px" onclick="unarchiveProject('${p.id}')">↩ Restore</button>`:""}
            ${isPriv()?`<button class="btn btn-danger" style="padding:6px 10px;font-size:12px" onclick="deleteProject('${p.id}')">🗑️</button>`:""}
          </div>
        </div>`;
      }).join("")}</div>`}
    </div></div>`;
  }

  // Export single file
  if(state.showExport){
    const ef=state.showExport;
    const opts=[
      {icon:"📧",label:"Send via Email",sub:"Opens your email client",fn:`exportEmail(${JSON.stringify(ef)})`},
      {icon:"💬",label:"Send via Text",sub:"Opens messaging app",fn:`exportSMS(${JSON.stringify(ef)})`},
      {icon:"🖨️",label:"Print Document",sub:"Opens print dialog",fn:`exportPrint(${JSON.stringify(ef)})`},
      {icon:"⬇️",label:"Download File",sub:"Save to device",fn:`window.open('${ef.downloadURL}','_blank')`},
    ];
    modals+=`<div class="modal-bg" onclick="state.showExport=null;render()"><div class="card fade-in" style="padding:24px;width:100%;max-width:400px" onclick="event.stopPropagation()">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px">
        <div><h2 style="font-weight:700;font-size:18px">Export Document</h2><p style="color:#606480;font-size:12px;margin-top:3px;word-break:break-word">${ef.name}</p></div>
        <button class="btn btn-ghost" style="padding:5px 9px;font-size:12px;flex-shrink:0;margin-left:8px" onclick="state.showExport=null;render()">✕</button>
      </div>
      ${opts.map(o=>`<div class="export-opt" onclick="${o.fn};state.showExport=null;render()">
        <div style="width:42px;height:42px;background:#2a2f45;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">${o.icon}</div>
        <div><div style="font-weight:600;font-size:14px">${o.label}</div><div style="color:#606480;font-size:12px">${o.sub}</div></div>
      </div>`).join("")}
    </div></div>`;
  }

  // Export all folder
  if(state.showFolderExport&&proj){
    const files=folderFiles.filter(f=>f.downloadURL);
    modals+=`<div class="modal-bg" onclick="state.showFolderExport=false;render()"><div class="card fade-in" style="padding:24px;width:100%;max-width:400px" onclick="event.stopPropagation()">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
        <h2 style="font-weight:700;font-size:18px">📤 Export Folder</h2>
        <button class="btn btn-ghost" style="padding:5px 9px;font-size:12px" onclick="state.showFolderExport=false;render()">✕</button>
      </div>
      <p style="color:#606480;font-size:13px;margin-bottom:16px">Export all ${files.length} file${files.length!==1?"s":""} from <strong style="color:#e8eaf0">${folderMeta?.label}</strong></p>
      ${[
        {icon:"📧",label:"Email Summary",sub:"Send summary via email",fn:`exportEmail({name:'${(folderMeta?.label||"").replace(/'/g,"\'")} Folder (${files.length} files)',uploader:'${state.activeRole?.label||state.worker}',uploadedAt:Date.now(),downloadURL:''});state.showFolderExport=false;render()`},
        {icon:"⬇️",label:"Download All",sub:"Save all files to device",fn:`${files.map(f=>`window.open('${f.downloadURL}','_blank')`).join(";")};state.showFolderExport=false;showToast('Downloading ${files.length} file(s)');render()`},
      ].map(o=>`<div class="export-opt" onclick="${o.fn}">
        <div style="width:42px;height:42px;background:#2a2f45;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">${o.icon}</div>
        <div><div style="font-weight:600;font-size:14px">${o.label}</div><div style="color:#606480;font-size:12px">${o.sub}</div></div>
      </div>`).join("")}
    </div></div>`;
  }

  // Receipt sidebar
  if(state.showReceiptSidebar&&proj){
    const rFiles=proj.folders?.receipts||[];
    const rTotal=getReceiptTotal(proj);
    modals+=`<div class="modal-bg" onclick="state.showReceiptSidebar=false;render()"><div class="card fade-in" style="padding:26px;width:100%;max-width:460px;max-height:85vh;overflow-y:auto" onclick="event.stopPropagation()">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px">
        <div><h2 style="font-weight:700;font-size:19px">🧾 Receipt Summary</h2><p style="color:#606480;font-size:12px;margin-top:3px">${proj.name}</p></div>
        <button class="btn btn-ghost" style="padding:5px 10px;font-size:12px" onclick="state.showReceiptSidebar=false;render()">✕</button>
      </div>
      <div style="background:rgba(52,199,89,.1);border:1.5px solid rgba(52,199,89,.3);border-radius:13px;padding:16px 20px;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between">
        <div style="font-size:13px;color:#a0a4b8;font-weight:600">TOTAL RECEIPTS</div>
        <div style="font-size:28px;font-weight:800;color:#34c759">$${rTotal.toFixed(2)}</div>
      </div>
      ${rFiles.length===0?`<div style="text-align:center;padding:32px 0;color:#606480"><div style="font-size:34px;margin-bottom:10px">🧾</div><div style="font-weight:600">No receipts yet</div><div style="font-size:12px;margin-top:5px">Upload receipts and add amounts to track totals</div></div>`:`
      <div style="display:flex;flex-direction:column;gap:9px">
        ${rFiles.map(f=>{const a=state.receiptAmounts[f.id];const pa=a?parseFloat(a):null;return `<div style="display:flex;align-items:center;gap:11px;padding:11px 14px;background:#13151f;border-radius:12px;border:1px solid #2a2f45">
          <div style="width:36px;height:36px;border-radius:8px;overflow:hidden;background:#2a2f45;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:17px">
            ${f.type?.startsWith("image/")&&f.downloadURL?`<img src="${f.downloadURL}" style="width:100%;height:100%;object-fit:cover"/>`:"🧾"}
          </div>
          <div style="flex:1;min-width:0"><div style="font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${f.name}</div><div style="font-size:11px;color:#606480;margin-top:2px">${f.uploader} · ${fmt(f.uploadedAt)}</div></div>
          <div style="font-weight:800;font-size:16px;color:${pa?"#34c759":"#3a3f55"}">${pa?"$"+pa.toFixed(2):"—"}</div>
        </div>`;}).join("")}
        <div style="padding:12px 14px;background:#13151f;border-radius:12px;border:1px solid rgba(52,199,89,.2);display:flex;justify-content:space-between;align-items:center">
          <div style="font-size:12px;color:#a0a4b8">${rFiles.filter(f=>state.receiptAmounts[f.id]).length} of ${rFiles.length} amounts entered</div>
          <div style="font-weight:800;font-size:17px;color:#34c759">$${rTotal.toFixed(2)}</div>
        </div>
      </div>`}
    </div></div>`;
  }

  // Preview
  if(state.preview){
    modals+=`<div class="modal-bg" onclick="state.preview=null;render()"><div style="max-width:760px;width:100%;text-align:center" onclick="event.stopPropagation()">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;color:#e8eaf0">
        <span style="font-weight:600;font-size:14px">${state.preview.name}</span>
        <button class="btn btn-ghost" onclick="state.preview=null;render()">✕ Close</button>
      </div>
      ${state.preview.type?.startsWith("image/")?`<img src="${state.preview.url}" style="max-width:100%;max-height:80vh;border-radius:12px;box-shadow:0 20px 80px rgba(0,0,0,.6)"/>`:`<iframe src="${state.preview.url}" style="width:100%;height:80vh;border:none;border-radius:12px"></iframe>`}
    </div></div>`;
  }

  root.innerHTML=toastHtml+uploadOverlay+`
    <header>
      ${headerLeft}
      ${headerRight}
    </header>
    <main>${screenHtml}</main>
    ${modals}`;

  attachEvents();
}

function attachEvents(){
  // Auto-focus receipt input if editing
  if(state.editingReceiptId){
    const inp = document.getElementById('ramt_'+state.editingReceiptId);
    if(inp){ inp.focus(); const v=state.receiptAmounts[state.editingReceiptId]||''; inp.value=v; inp.select(); }
  }
  // PWA install prompt
  if(window._deferredPrompt){
    document.getElementById("pwaBanner")?.classList.add("show");
  }
}

// ── PWA INSTALL ──
window.addEventListener("beforeinstallprompt",e=>{e.preventDefault();window._deferredPrompt=e;document.getElementById("pwaBanner")?.classList.add("show");});
if("serviceWorker" in navigator){ navigator.serviceWorker.getRegistrations().then(regs=>{ Promise.all(regs.map(r=>r.unregister())).then(()=>{ navigator.serviceWorker.register("sw.js?v=1780952732").then(()=>console.log("SW fresh")).catch(e=>console.warn(e)); }); }); }

// iOS PWA hint
const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent)&&!window.MSStream;
const isStandalone=window.navigator.standalone;
if(isIOS&&!isStandalone){setTimeout(()=>{document.getElementById("pwaBanner")?.classList.add("show");},2000);}

// ── INIT ──
window.addEventListener("firebase-ready",()=>{
  const {db:_db,storage:_st,...fns}=window._fb;
  db=_db;storage=_st;fbFns=window._fb;
  fbLoad();
});
render(); // show loading screen immediately
</script>
</body>
</html>
